name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Check Python syntax
        run: python -m compileall -q facade/ghidra_lab_mcp
      - name: Run unit tests
        run: PYTHONPATH=facade python -m unittest discover -s tests
      - name: Check shell syntax
        run: bash -n scripts/init.sh scripts/smoke.sh image/bin/*.sh
      - name: Check Compose configuration
        run: docker compose --env-file .env.example config --quiet
