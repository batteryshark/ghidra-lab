name: ghidra-lab

x-ghidra-lab-build: &ghidra-lab-build
  context: .
  dockerfile: image/Dockerfile
  args:
    GHIDRA_VERSION: ${GHIDRA_VERSION:-12.1.2}
    GHIDRA_DATE: ${GHIDRA_DATE:-20260605}
    GHIDRA_MCP_REF: ${GHIDRA_MCP_REF:-378f727b7059163eb6ba3ae315c4d9233decba66}

services:
  ghidra-server:
    image: ghidra-lab:local
    build: *ghidra-lab-build
    restart: unless-stopped
    entrypoint: ["/opt/ghidra-lab/bin/ghidra-server-entrypoint.sh"]
    environment:
      GHIDRA_SERVER_PUBLIC_HOST: ${GHIDRA_SERVER_PUBLIC_HOST:-${GHIDRA_LAB_BIND:-127.0.0.1}}
      GHIDRA_SERVER_ALT_NAMES: ${GHIDRA_SERVER_ALT_NAMES:-${GHIDRA_LAB_BIND:-127.0.0.1};ghidra-server}
      GHIDRA_SERVER_BASE_PORT: 13100
      GHIDRA_SERVER_MAX_MEMORY_MB: ${GHIDRA_SERVER_MAX_MEMORY_MB:-2048}
      GHIDRA_AGENT_SERVER_USER: ${GHIDRA_AGENT_SERVER_USER:-agent}
      GHIDRA_SERVER_PASSWORD_FILE: /run/secrets/ghidra_agent_password
    volumes:
      - ./data/repositories:/data/repositories
      - ./data/server:/data/server
      - ./data/server-logs:/data/logs
      - ./.ghidra-agent-password:/run/secrets/ghidra_agent_password:ro
    ports:
      - "${GHIDRA_LAB_BIND:-127.0.0.1}:13100:13100"
      - "${GHIDRA_LAB_BIND:-127.0.0.1}:13101:13101"
      - "${GHIDRA_LAB_BIND:-127.0.0.1}:13102:13102"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/13100' 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  ghidra-lab:
    image: ghidra-lab:local
    build: *ghidra-lab-build
    restart: unless-stopped
    depends_on:
      ghidra-server:
        condition: service_healthy
    environment:
      GHIDRA_LAB_TOKEN: ${GHIDRA_LAB_TOKEN:?set GHIDRA_LAB_TOKEN in .env}
      GHIDRA_LAB_PUBLIC_BASE_URL: ${GHIDRA_LAB_PUBLIC_BASE_URL:-http://127.0.0.1:18080}
      GHIDRA_LAB_SEARCH_RESULTS: ${GHIDRA_LAB_SEARCH_RESULTS:-8}
      GHIDRA_LAB_MAX_UPLOAD_BYTES: ${GHIDRA_LAB_MAX_UPLOAD_BYTES:-4294967296}
      GHIDRA_LAB_SAMPLE_ROOT: /data/uploads
      GHIDRA_MCP_FILE_ROOT: /data/uploads
      GHIDRA_REST_URL: http://127.0.0.1:8089
      GHIDRA_MCP_URL: http://127.0.0.1:8089
      GHIDRA_BRIDGE_MCP_URL: http://127.0.0.1:8081/mcp
      GHIDRA_SERVER_HOST: ${GHIDRA_AGENT_SERVER_HOST:-${GHIDRA_SERVER_PUBLIC_HOST:-ghidra-server}}
      GHIDRA_SERVER_PORT: ${GHIDRA_AGENT_SERVER_PORT:-13100}
      GHIDRA_SERVER_USER: ${GHIDRA_AGENT_SERVER_USER:-agent}
      GHIDRA_SERVER_PASSWORD_FILE: /run/secrets/ghidra_agent_password
      GHIDRA_LAB_DEFAULT_REPOSITORY: ${GHIDRA_LAB_DEFAULT_REPOSITORY:-GhidraLab}
      GHIDRA_LAB_REPO_USERS: ${GHIDRA_LAB_REPO_USERS:-}
      GHIDRA_LAB_SHARED_PROJECT_ROOT: /data/projects
      GHIDRA_LAB_ANALYZE_HEADLESS_TIMEOUT: ${GHIDRA_LAB_ANALYZE_HEADLESS_TIMEOUT:-1800}
      GHIDRA_LAB_ANALYSIS_TIMEOUT_PER_FILE: ${GHIDRA_LAB_ANALYSIS_TIMEOUT_PER_FILE:-0}
      GHIDRA_LAB_HOST: 0.0.0.0
      GHIDRA_LAB_PORT: 8080
      JAVA_OPTS: ${JAVA_OPTS:-}
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/projects:/data/projects
      - ./data/logs:/data/logs
      - ./.ghidra-agent-password:/run/secrets/ghidra_agent_password:ro
    ports:
      - "127.0.0.1:${GHIDRA_LAB_LOCAL_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
